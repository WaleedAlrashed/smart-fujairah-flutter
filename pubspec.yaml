name: smart_fujairah_complete
description: "Smart Fujairah - Government Services App (Cordova to Flutter Migration)"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  dio: ^5.8.0+1
  easy_localization: ^3.0.7+1
  go_router: ^15.1.2
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  file_picker: ^8.3.7
  http_parser: ^4.1.2
  path: ^1.9.1
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.5
  firebase_crashlytics: ^4.3.5
  google_generative_ai: ^0.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
